<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Visor de director</title>
<style>
  :root {
    --bg: #000;
    --panel: rgba(18, 18, 20, 0.92);
    --line: rgba(255, 255, 255, 0.14);
    --txt: #f2f2f2;
    --txt-dim: #9a9a9e;
    --accent: #ff5a52;
    --mask: rgba(0, 0, 0, 0.82);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--txt);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ---- Escena de cámara ---- */
  #stage {
    position: fixed;
    inset: 0;
    background: #000;
    overflow: hidden;
  }
  #cam {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
    transition: transform 0.15s ease-out;
    background: #000;
  }
  /* Máscara de ratio: el "hueco" queda claro, el resto oscurecido por el box-shadow gigante */
  #mask {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 100vmax var(--mask);
    outline: 1px solid rgba(255, 255, 255, 0.35);
    pointer-events: none;
    transition: width 0.15s, height 0.15s;
  }

  /* ---- Aviso de recorte imposible ---- */
  #warn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 12px);
    left: 50%;
    transform: translateX(-50%);
    max-width: 88vw;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
    display: none;
    z-index: 30;
  }
  #warn.show { display: block; }

  /* ---- HUD inferior ---- */
  #hud {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 20;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--line);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--txt);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .pill b { color: var(--accent); font-weight: 700; }
  button {
    font: inherit;
    color: var(--txt);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  button:active { transform: scale(0.96); }

  /* ---- Panel de setup ---- */
  #panel {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  #panel.show { display: flex; }
  .sheet {
    width: 100%;
    max-width: 520px;
    max-height: 88vh;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(env(safe-area-inset-bottom, 0) + 24px);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  @media (min-width: 560px) {
    #panel { align-items: center; }
    .sheet { border-radius: 22px; }
  }
  .sheet h1 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .sheet .sub { color: var(--txt-dim); font-size: 12px; margin-bottom: 18px; }

  .group { margin-bottom: 18px; }
  .group > label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--txt-dim);
    margin-bottom: 8px;
  }
  select, input[type="number"] {
    width: 100%;
    font: inherit;
    color: var(--txt);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    appearance: none;
    -webkit-appearance: none;
  }

  /* Chips de ratio */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.05);
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .chip.active {
    border-color: var(--accent);
    background: rgba(255, 90, 82, 0.16);
    color: #fff;
  }

  /* Tabla FOV */
  table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 8px 6px;
    border-bottom: 1px solid var(--line);
  }
  th { color: var(--txt-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  tr.cam { cursor: pointer; }
  tr.cam.active td { color: #fff; }
  tr.cam.active td:first-child::before {
    content: "●";
    color: var(--accent);
    margin-right: 6px;
    font-size: 10px;
  }

  .done {
    width: 100%;
    margin-top: 6px;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-weight: 700;
  }
  .note {
    font-size: 12px;
    color: var(--txt-dim);
    margin-top: 10px;
    line-height: 1.5;
  }
  #err {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    color: var(--txt-dim);
    z-index: 50;
    background: #000;
  }
  #err.show { display: flex; }
</style>

<div id="stage">
  <video id="cam" playsinline autoplay muted></video>
  <div id="mask"></div>
</div>

<div id="warn"></div>

<div id="hud">
  <div class="pill" id="readout">
    <span id="ro-target">—</span> · <b id="ro-fov">—°</b>
  </div>
  <button id="open">⚙︎ Ajustes</button>
</div>

<div id="panel">
  <div class="sheet">
    <h1>Configuración del visor</h1>
    <div class="sub">El móvil es el proxy. Elige con qué captura y qué cámara/óptica quieres simular.</div>

    <div class="group">
      <label>Máscara de ratio</label>
      <div class="chips" id="ratios"></div>
    </div>

    <div class="group">
      <label>Tu móvil</label>
      <select id="phone"></select>
    </div>

    <div class="group">
      <label>Cámara del móvil (FOV de partida)</label>
      <table>
        <thead><tr><th>Cámara</th><th>Focal eq.</th><th>FOV horiz.</th></tr></thead>
        <tbody id="camrows"></tbody>
      </table>
      <div class="note">Consejo: la <b>ultra gran angular</b> deja más margen para recortar hacia focales cerradas. El acceso a una lente concreta en iOS por web no está garantizado.</div>
    </div>

    <div class="group">
      <label>Cámara de cine a simular</label>
      <select id="cine"></select>
    </div>

    <div class="group">
      <label>Focal objetivo (mm)</label>
      <input id="focal" type="number" min="4" max="1000" step="1" value="35" inputmode="numeric">
    </div>

    <button class="done" id="close">Ver encuadre</button>
  </div>
</div>

<div id="err"></div>

<script>
/* ============================================================
   Datos F1 (MVP). FOV horizontal en grados por cámara de móvil.
   Ampliar con más modelos en F2.
   ============================================================ */
const PHONES = {
  "iphone-12-pro": {
    name: "iPhone 12 Pro",
    cams: [
      { id: "uw",   label: "Ultra gran angular", eq: "13 mm", hfov: 106 },
      { id: "wide", label: "Gran angular",       eq: "26 mm", hfov: 70  },
      { id: "tele", label: "Teleobjetivo",       eq: "52 mm", hfov: 37  },
    ],
  },
};

/* Cámaras de cine: ancho de sensor en mm (para calcular FOV objetivo). */
const CINE = [
  { id: "alexa35",   name: "ARRI Alexa 35 (S35)",     sw: 27.99 },
  { id: "alexamini", name: "ARRI Alexa Mini (S35)",   sw: 28.25 },
  { id: "venice",    name: "Sony Venice (Full Frame)", sw: 35.9 },
  { id: "komodo",    name: "RED Komodo (S35)",        sw: 27.03 },
  { id: "ff",        name: "Full Frame 36 mm",        sw: 36.0 },
  { id: "s16",       name: "Super 16",                sw: 12.52 },
];

const RATIOS = [
  { id: "2.39", label: "2.39:1", r: 2.39 },
  { id: "1.85", label: "1.85:1", r: 1.85 },
  { id: "16:9", label: "16:9",   r: 16 / 9 },
  { id: "4:3",  label: "4:3",    r: 4 / 3 },
  { id: "1:1",  label: "1:1",    r: 1 },
  { id: "9:16", label: "9:16",   r: 9 / 16 },
];

/* ---- Estado ---- */
const state = {
  phoneId: "iphone-12-pro",
  camId: "uw",
  cineId: "alexa35",
  focal: 35,
  ratioId: "2.39",
};

/* ---- Helpers ---- */
const $ = (s) => document.querySelector(s);
const rad = (d) => (d * Math.PI) / 180;
const deg = (r) => (r * 180) / Math.PI;

function targetHFov() {
  const cam = CINE.find((c) => c.id === state.cineId);
  return deg(2 * Math.atan(cam.sw / (2 * state.focal)));
}
function captureHFov() {
  return PHONES[state.phoneId].cams.find((c) => c.id === state.camId).hfov;
}

/* Recorte: escala de zoom para pasar del FOV de captura (A) al objetivo (B). */
function cropScale() {
  const a = captureHFov(), b = targetHFov();
  return Math.tan(rad(a / 2)) / Math.tan(rad(b / 2)); // >1 = zoom in; <1 = imposible
}

/* ============================================================
   Render
   ============================================================ */
function layoutMask() {
  const stage = $("#stage").getBoundingClientRect();
  const r = RATIOS.find((x) => x.id === state.ratioId).r;
  let w = stage.width, h = w / r;
  if (h > stage.height) { h = stage.height; w = h * r; }
  const mask = $("#mask");
  mask.style.width = Math.round(w) + "px";
  mask.style.height = Math.round(h) + "px";
}

function applyCrop() {
  const s = cropScale();
  const cam = $("#cam");
  const warn = $("#warn");
  if (s < 1) {
    // El objetivo es más ancho que lo que capta el móvil: no se puede "des-recortar".
    cam.style.transform = "scale(1)";
    warn.textContent = "Focal demasiado abierta para esta cámara del móvil — usa la ultra gran angular";
    warn.classList.add("show");
  } else {
    cam.style.transform = "scale(" + s.toFixed(4) + ")";
    warn.classList.remove("show");
  }
}

function updateReadout() {
  const cine = CINE.find((c) => c.id === state.cineId);
  $("#ro-target").textContent = cine.name.split(" (")[0] + " · " + state.focal + "mm";
  $("#ro-fov").textContent = targetHFov().toFixed(0) + "°";
}

function render() {
  layoutMask();
  applyCrop();
  updateReadout();
}

/* ============================================================
   Construcción de UI
   ============================================================ */
function buildRatios() {
  const box = $("#ratios");
  box.innerHTML = "";
  RATIOS.forEach((r) => {
    const el = document.createElement("div");
    el.className = "chip" + (r.id === state.ratioId ? " active" : "");
    el.textContent = r.label;
    el.onclick = () => {
      state.ratioId = r.id;
      buildRatios();
      render();
    };
    box.appendChild(el);
  });
}

function buildPhones() {
  const sel = $("#phone");
  sel.innerHTML = "";
  Object.entries(PHONES).forEach(([id, p]) => {
    const o = document.createElement("option");
    o.value = id;
    o.textContent = p.name;
    sel.appendChild(o);
  });
  sel.value = state.phoneId;
  sel.onchange = () => {
    state.phoneId = sel.value;
    state.camId = PHONES[state.phoneId].cams[0].id;
    buildCamRows();
    render();
  };
}

function buildCamRows() {
  const body = $("#camrows");
  body.innerHTML = "";
  PHONES[state.phoneId].cams.forEach((c) => {
    const tr = document.createElement("tr");
    tr.className = "cam" + (c.id === state.camId ? " active" : "");
    tr.innerHTML =
      "<td>" + c.label + "</td><td>" + c.eq + "</td><td>" + c.hfov + "°</td>";
    tr.onclick = () => {
      state.camId = c.id;
      buildCamRows();
      render();
    };
    body.appendChild(tr);
  });
}

function buildCine() {
  const sel = $("#cine");
  sel.innerHTML = "";
  CINE.forEach((c) => {
    const o = document.createElement("option");
    o.value = c.id;
    o.textContent = c.name;
    sel.appendChild(o);
  });
  sel.value = state.cineId;
  sel.onchange = () => { state.cineId = sel.value; render(); };
}

$("#focal").oninput = (e) => {
  const v = parseFloat(e.target.value);
  if (!isNaN(v) && v > 0) { state.focal = v; render(); }
};

$("#open").onclick = () => $("#panel").classList.add("show");
$("#close").onclick = () => $("#panel").classList.remove("show");
$("#panel").onclick = (e) => { if (e.target.id === "panel") $("#panel").classList.remove("show"); };

window.addEventListener("resize", layoutMask);
window.addEventListener("orientationchange", () => setTimeout(layoutMask, 250));

/* ============================================================
   Cámara
   ============================================================ */
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return showError("Este navegador no soporta acceso a la cámara.");
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
    });
    const cam = $("#cam");
    cam.srcObject = stream;
    await cam.play().catch(() => {});
  } catch (err) {
    showError(
      "No se pudo acceder a la cámara.<br><br>" +
      "Necesita <b>HTTPS</b> (o localhost) y permiso.<br>" +
      "<span style='font-size:12px'>" + (err && err.name ? err.name : "Error") + "</span>"
    );
  }
}

function showError(html) {
  const e = $("#err");
  e.innerHTML = "<div>" + html + "</div>";
  e.classList.add("show");
}

/* ---- Init ---- */
buildRatios();
buildPhones();
buildCamRows();
buildCine();
render();
startCamera();
</script>
